<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Byte-Bot Progress Roadmap</title>
  <desc id="desc">Pixel-style roadmap showing completed Byte-Bot work and remaining goals.</desc>
  <defs>
    <style>
      .pixel { font-family: "Courier New", monospace; font-weight: 800; }
      .small { font-size: 22px; }
      .body { font-size: 28px; }
      .heading { font-size: 42px; }
      .title { font-size: 64px; }
      .white { fill: #f7fbff; }
      .muted { fill: #b8c7dc; }
      .gold { fill: #ffc91a; }
      .cyan { fill: #5fe8ff; }
      .green { fill: #75e36f; }
      .pink { fill: #ff79c8; }
      .panel { fill: #0c1322; stroke: #63708b; stroke-width: 4; }
      .card { fill: #14223a; stroke: #52617a; stroke-width: 3; }
      .next { fill: #17153d; stroke: #6d63ff; stroke-width: 3; }
      .bar-bg { fill: #26344f; }
      .bar-fill { fill: #5fe8ff; }
      .shadow { fill: #000812; opacity: 0.45; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#050816"/>
  <rect y="0" width="1600" height="900" fill="#0a0830"/>

  <g opacity="0.9">
    <rect x="90" y="70" width="8" height="8" fill="#5fe8ff"/>
    <rect x="230" y="138" width="6" height="6" fill="#7e7bff"/>
    <rect x="390" y="72" width="10" height="10" fill="#5fe8ff"/>
    <rect x="1160" y="95" width="8" height="8" fill="#5fe8ff"/>
    <rect x="1330" y="170" width="6" height="6" fill="#7e7bff"/>
    <rect x="1450" y="82" width="10" height="10" fill="#5fe8ff"/>
    <path d="M1250 54h10v22h22v10h-22v22h-10V86h-22V76h22z" fill="#5fe8ff"/>
    <path d="M520 120h8v18h18v8h-18v18h-8v-18h-18v-8h18z" fill="#5fe8ff"/>
  </g>

  <path d="M0 250 C210 160 330 210 490 145 C630 90 760 160 890 110 C1060 45 1240 150 1600 80 L1600 345 L0 345Z" fill="#22106d"/>
  <path d="M0 324 C170 250 340 304 520 220 C650 160 790 250 960 205 C1170 150 1340 260 1600 180 L1600 420 L0 420Z" fill="#321699"/>
  <path d="M0 430 C220 350 430 390 600 320 C760 250 900 340 1090 300 C1280 260 1420 360 1600 310 L1600 520 L0 520Z" fill="#150b52"/>

  <text x="80" y="90" class="pixel gold small">BYTE-BOT PROJECT STATUS</text>
  <text x="80" y="160" class="pixel title white">Byte-Bot Progress</text>
  <text x="84" y="202" class="pixel body cyan">Level 2: Working Full-Stack Prototype</text>
  <text x="84" y="238" class="pixel small muted">Current distance to full goal: about 45% done</text>

  <g transform="translate(80 285)">
    <rect class="shadow" x="10" y="10" width="690" height="460"/>
    <rect class="panel" x="0" y="0" width="690" height="460"/>
    <text x="32" y="58" class="pixel heading green">DONE</text>
    <text x="36" y="96" class="pixel small muted">Stable pieces already built</text>

    <g transform="translate(32 130)">
      <rect class="card" x="0" y="0" width="292" height="62"/><text x="20" y="40" class="pixel body white">Pixel UI</text><rect x="244" y="18" width="24" height="24" fill="#75e36f"/>
      <rect class="card" x="330" y="0" width="292" height="62"/><text x="350" y="40" class="pixel body white">Login</text><rect x="574" y="18" width="24" height="24" fill="#75e36f"/>
      <rect class="card" x="0" y="82" width="292" height="62"/><text x="20" y="122" class="pixel body white">Chat UI</text><rect x="244" y="100" width="24" height="24" fill="#75e36f"/>
      <rect class="card" x="330" y="82" width="292" height="62"/><text x="350" y="122" class="pixel body white">FastAPI</text><rect x="574" y="100" width="24" height="24" fill="#75e36f"/>
      <rect class="card" x="0" y="164" width="292" height="62"/><text x="20" y="204" class="pixel body white">Groq Chain</text><rect x="244" y="182" width="24" height="24" fill="#75e36f"/>
      <rect class="card" x="330" y="164" width="292" height="62"/><text x="350" y="204" class="pixel body white">SQLite Memory</text><rect x="574" y="182" width="24" height="24" fill="#75e36f"/>
      <rect class="card" x="0" y="246" width="292" height="62"/><text x="20" y="286" class="pixel body white">Reset</text><rect x="244" y="264" width="24" height="24" fill="#75e36f"/>
      <rect class="card" x="330" y="246" width="292" height="62"/><text x="350" y="286" class="pixel body white">Docs</text><rect x="574" y="264" width="24" height="24" fill="#75e36f"/>
    </g>
  </g>

  <g transform="translate(830 285)">
    <rect class="shadow" x="10" y="10" width="690" height="460"/>
    <rect class="panel" x="0" y="0" width="690" height="460"/>
    <text x="32" y="58" class="pixel heading gold">NEXT</text>
    <text x="36" y="96" class="pixel small muted">Main goal modules left</text>

    <g transform="translate(32 130)">
      <rect class="next" x="0" y="0" width="622" height="56"/><text x="20" y="36" class="pixel body white">TTS</text><rect class="bar-bg" x="220" y="18" width="280" height="20"/><rect class="bar-fill" x="220" y="18" width="0" height="20"/><text x="524" y="36" class="pixel small cyan">0%</text>
      <rect class="next" x="0" y="68" width="622" height="56"/><text x="20" y="104" class="pixel body white">STT</text><rect class="bar-bg" x="220" y="86" width="280" height="20"/><rect class="bar-fill" x="220" y="86" width="0" height="20"/><text x="524" y="104" class="pixel small cyan">0%</text>
      <rect class="next" x="0" y="136" width="622" height="56"/><text x="20" y="172" class="pixel body white">PDF RAG</text><rect class="bar-bg" x="220" y="154" width="280" height="20"/><rect class="bar-fill" x="220" y="154" width="56" height="20"/><text x="524" y="172" class="pixel small cyan">20%</text>
      <rect class="next" x="0" y="204" width="622" height="56"/><text x="20" y="240" class="pixel body white">Image Search</text><rect class="bar-bg" x="220" y="222" width="280" height="20"/><rect class="bar-fill" x="220" y="222" width="28" height="20"/><text x="524" y="240" class="pixel small cyan">10%</text>
      <rect class="next" x="0" y="272" width="622" height="56"/><text x="20" y="308" class="pixel body white">Semantic Search</text><rect class="bar-bg" x="220" y="290" width="280" height="20"/><rect class="bar-fill" x="220" y="290" width="42" height="20"/><text x="524" y="308" class="pixel small cyan">15%</text>
    </g>
  </g>

  <g transform="translate(585 760)">
    <rect class="shadow" x="8" y="8" width="430" height="80"/>
    <rect x="0" y="0" width="430" height="80" fill="#10182a" stroke="#ffc91a" stroke-width="4"/>
    <text x="34" y="50" class="pixel body gold">FULL GOAL: 45% DONE</text>
  </g>

  <g transform="translate(1370 705)">
    <rect x="68" y="0" width="92" height="72" fill="#8fa1b8" stroke="#334156" stroke-width="6"/>
    <rect x="86" y="18" width="56" height="36" fill="#72d2d6" stroke="#31515f" stroke-width="4"/>
    <text x="98" y="44" class="pixel small" fill="#102632">uwu</text>
    <rect x="100" y="72" width="30" height="20" fill="#71839c" stroke="#334156" stroke-width="5"/>
    <rect x="76" y="92" width="78" height="26" fill="#6d7d95" stroke="#334156" stroke-width="5"/>
    <rect x="134" y="100" width="10" height="10" fill="#ff79c8"/>
    <rect x="148" y="100" width="10" height="10" fill="#5fe8ff"/>
  </g>
</svg>
